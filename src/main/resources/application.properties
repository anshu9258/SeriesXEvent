# ================================================================
#  SeriesX Events - Application Configuration
# ================================================================

# -- Server --
server.port=${PORT:8080}

# -- MySQL Database (Railway) --
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -- JPA / Hibernate --
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -- Gmail SMTP --
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=hello.seriesxevent@gmail.com
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# -- App Settings --
app.admin.email=hello.seriesxevent@gmail.com

# -- Logging --
logging.level.com.seriesxevents=INFO
