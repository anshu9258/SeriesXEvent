# ================================================================
#  SeriesX Events - Application Configuration
#  INSTRUCTIONS: Replace all YOUR_* values before running
# ================================================================

# ── Server ──────────────────────────────────────────────────────
server.port=8082

# ── MySQL Database ───────────────────────────────────────────────
# Step 1: Create database in MySQL: CREATE DATABASE seriesxevents_db;
# Step 2: Replace YOUR_DB_PASSWORD with your MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/seriesxevents_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
# 'update' will auto-create/update tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Gmail SMTP ───────────────────────────────────────────────────
# Step 3: Replace YOUR_GMAIL with your Gmail address
# Step 4: Replace YOUR_APP_PASSWORD with Gmail App Password
#         (Gmail > Account > Security > 2FA > App Passwords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hello.seriesxevent@gmail.com
spring.mail.password=fpsb czaa wnxg ijtw
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App Settings ─────────────────────────────────────────────────
# Email address that receives contact form notifications
app.admin.email=hello.seriesxevent@gmail.com

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.seriesxevents=INFO